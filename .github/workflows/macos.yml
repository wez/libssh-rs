name: macOS

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macOS-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: "checkout repo"
      uses: actions/checkout@v4
      with:
        submodules: "recursive"
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Build and test
      run: |
        rustc -V
        cargo -V
        cargo run --example link --features vendored,vendored-openssl

